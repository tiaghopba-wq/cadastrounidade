<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Centrallab</title>
<style>
  body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px; }
  .container { max-width:720px; margin:0 auto; background:#fff; padding:30px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
  h1 { font-size:20px; color:#2c3e50; }
  h2 { font-size:15px; color:#2c3e50; border-bottom:2px solid #eee; padding-bottom:6px; margin-top:30px;}
  label { display:block; margin-top:14px; font-weight:bold; font-size:13px; color:#333;}
  input[type=text], input[type=number], input[type=tel], input[type=email], select, textarea {
    width:100%; padding:8px; margin-top:4px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box; font-size:14px;
  }
  input[type=file] { margin-top:6px; }
  .checkbox-group label, .radio-group label { font-weight:normal; display:inline-block; margin-right:16px; }
  .checkbox-group, .radio-group { margin-top:6px; }
  button { margin-top:26px; background:#2c7be5; color:#fff; border:none; padding:12px 20px; border-radius:5px; font-size:15px; cursor:pointer; }
  button:hover { background:#1a5fc0; }
  button:disabled { background:#9bb8dd; cursor:not-allowed; }
  #successMsg { display:none; background:#e6f6ea; border:1px solid #34a853; color:#1e7e34; padding:16px; border-radius:6px; margin-top:20px; font-weight:bold; }
  .secao { display:none; }
  .top-select { background:#eef4ff; padding:16px; border-radius:6px; }
</style>
</head>
<body>
<div class="container">
  <h1>Formulário de Cadastro</h1>

  <div class="top-select">
    <label>O que você está cadastrando?</label>
    <div class="radio-group">
      <label><input type="radio" name="tipo_cadastro" value="unidade_coleta" required> Unidade de Coleta</label>
      <label><input type="radio" name="tipo_cadastro" value="fonte_pagadora" required> Fonte Pagadora</label>
    </div>
  </div>

  <form id="collectForm">

  <!-- ==================== SEÇÃO: UNIDADE DE COLETA ==================== -->
  <div class="secao" id="secaoUnidade">
    <h2>Identificação</h2>
    <label>Grupo/Empresa</label>
    <div class="radio-group">
      <label><input type="radio" name="grupo_empresa" value="Centrallab" data-sec="unidade"> Centrallab</label>
      <label><input type="radio" name="grupo_empresa" value="Cuidamais" data-sec="unidade"> Cuidamais</label>
      <label><input type="radio" name="grupo_empresa" value="Outra" data-sec="unidade"> Outra</label>
    </div>

    <label>Nome da Unidade (Descrição)</label>
    <input type="text" name="descricao" data-sec="unidade">

    <label>Cartão internet</label>
    <select name="cartao_internet" data-sec="unidade">
      <option value="Não Imprime">Não Imprime</option>
      <option value="Imprime">Imprime</option>
    </select>

    <label>Regional</label>
    <input type="text" name="regional" data-sec="unidade">

    <label>Unidade (código/nome interno)</label>
    <input type="text" name="unidade" data-sec="unidade">

    <label>Maioridade (exceção)</label>
    <input type="text" name="maioridade_excecao" data-sec="unidade">

    <label>C.N.E.S.</label>
    <input type="text" name="cnes" data-sec="unidade">

    <label>Responsável técnico</label>
    <input type="text" name="responsavel_tecnico" data-sec="unidade">

    <label>Obrigatoriedade (documentos exigidos)</label>
    <div class="checkbox-group" data-group="obrigatoriedade" data-sec="unidade">
      <label><input type="checkbox" name="obrigatoriedade" value="Documento fiscal"> Documento fiscal</label>
      <label><input type="checkbox" name="obrigatoriedade" value="R.G."> R.G.</label>
      <label><input type="checkbox" name="obrigatoriedade" value="C.P.F."> C.P.F.</label>
      <label><input type="checkbox" name="obrigatoriedade" value="CNS"> CNS</label>
      <label><input type="checkbox" name="obrigatoriedade" value="Doc. estrangeiro"> Doc. estrangeiro</label>
      <label><input type="checkbox" name="obrigatoriedade" value="Endereço"> Endereço</label>
      <label><input type="checkbox" name="obrigatoriedade" value="Filiação"> Filiação</label>
      <label><input type="checkbox" name="obrigatoriedade" value="E-mail"> E-mail</label>
      <label><input type="checkbox" name="obrigatoriedade" value="Paciente Externo"> Paciente Externo</label>
    </div>

    <h2>Endereço</h2>
    <label>CEP</label>
    <input type="text" name="cep" data-sec="unidade">
    <label>Logradouro</label>
    <input type="text" name="logradouro" data-sec="unidade">
    <label>Complemento</label>
    <input type="text" name="complemento" data-sec="unidade">
    <label>Número</label>
    <input type="text" name="numero_endereco" data-sec="unidade">
    <label>Bairro</label>
    <input type="text" name="bairro" data-sec="unidade">
    <label>Cidade</label>
    <input type="text" name="cidade" data-sec="unidade">
    <label>Estado (UF)</label>
    <input type="text" name="estado" maxlength="2" data-sec="unidade">

    <h2>Telefone</h2>
    <label>Telefone</label>
    <input type="tel" name="telefone" data-sec="unidade">

    <h2>Atendimento</h2>
    <label>Segmento</label>
    <div class="checkbox-group" data-group="segmento" data-sec="unidade">
      <label><input type="checkbox" name="segmento" value="Diagnóstico"> Diagnóstico</label>
      <label><input type="checkbox" name="segmento" value="Vacina"> Vacina</label>
    </div>

    <label>Categoria</label>
    <input type="text" name="categoria" data-sec="unidade">

    <label>Atendimento</label>
    <input type="text" name="atendimento" data-sec="unidade">

    <label>Informações de atendimento</label>
    <textarea name="inf_atendimento" rows="3" data-sec="unidade"></textarea>

    <div class="checkbox-group" style="margin-top:14px;">
      <label><input type="checkbox" name="permite_emergencia"> Permite emergência</label><br>
      <label><input type="checkbox" name="permite_prazo_minimo"> Permite utilizar botão de prazo mínimo</label><br>
      <label><input type="checkbox" name="endereco_hospitalar"> Endereço hospitalar</label><br>
      <label><input type="checkbox" name="pedido_externo"> Pedido externo</label><br>
      <label><input type="checkbox" name="prontuario"> Prontuário</label><br>
      <label><input type="checkbox" name="autorizacao_paciente_os"> Autorização do paciente obrigatória no cadastro da O.S.</label>
    </div>

    <label>Status inicial do procedimento</label>
    <div class="radio-group">
      <label><input type="radio" name="status_inicial_procedimento" value="Aguardando Amostra"> Aguardando Amostra</label>
      <label><input type="radio" name="status_inicial_procedimento" value="Hold Unidade"> Hold Unidade</label>
    </div>

    <div class="checkbox-group" style="margin-top:14px;">
      <label><input type="checkbox" name="dia_producao_padrao"> Dia de produção: usar padrão do sistema</label><br>
      <label><input type="checkbox" name="dia_entrega_padrao"> Dia de entrega: usar padrão do sistema</label>
    </div>

    <h2>Pagamento</h2>
    <label>Empresa prestadora</label>
    <input type="text" name="empresa_prestadora" data-sec="unidade">

    <label>Percentual máximo de desconto (%)</label>
    <input type="number" step="0.01" name="percentual_max_desconto" data-sec="unidade">

    <div class="checkbox-group" style="margin-top:14px;">
      <label><input type="checkbox" name="imprime_resultado_debito"> Imprime resultado em débito</label>
    </div>

    <h2>Amostras</h2>
    <label>Transportar amostras em</label>
    <div class="radio-group">
      <label><input type="radio" name="transportar_amostras_em" value="Malote"> Malote</label>
      <label><input type="radio" name="transportar_amostras_em" value="Caixa"> Caixa</label>
    </div>

    <label>Fechar malote</label>
    <div class="radio-group">
      <label><input type="radio" name="fechar_malote" value="Completo"> Completo</label>
      <label><input type="radio" name="fechar_malote" value="Por amostra"> Por amostra</label>
      <label><input type="radio" name="fechar_malote" value="Ambos"> Ambos</label>
    </div>

    <label>Malote agrupado por</label>
    <div class="radio-group">
      <label><input type="radio" name="malote_agrupado_por" value="Und. coleta"> Und. coleta</label>
      <label><input type="radio" name="malote_agrupado_por" value="Und. atendimento"> Und. atendimento</label>
      <label><input type="radio" name="malote_agrupado_por" value="Fonte Pag."> Fonte Pag.</label>
    </div>

    <label>Unidade de destino por</label>
    <div class="radio-group">
      <label><input type="radio" name="unidade_destino_por" value="Setor de execução"> Setor de execução</label>
      <label><input type="radio" name="unidade_destino_por" value="Unidade de processamento"> Unidade de processamento</label>
    </div>

    <label>Tempo de transporte (minutos)</label>
    <input type="number" name="tempo_transporte" data-sec="unidade">

    <h2>Templates</h2>
    <label>Template de laudo</label>
    <input type="text" name="template_laudo" data-sec="unidade">

    <label>Template e-LIS</label>
    <input type="text" name="template_elis" data-sec="unidade">

    <label>Regras de impressão por ação (descreva se necessário)</label>
    <textarea name="regras_impressao_acao" rows="3" data-sec="unidade"></textarea>
  </div>

  <!-- ==================== SEÇÃO: FONTE PAGADORA ==================== -->
  <div class="secao" id="secaoFonte">
    <h2>Identificação</h2>
    <label>Descrição</label>
    <input type="text" name="descricao_fp" data-sec="fonte">

    <label>Razão social</label>
    <input type="text" name="razao_social" data-sec="fonte">

    <label>Nome fantasia</label>
    <input type="text" name="nome_fantasia" data-sec="fonte">

    <label>Tipo</label>
    <div class="radio-group" data-group="tipo_fp" data-sec="fonte">
      <label><input type="radio" name="tipo_fp" value="Balcão"> Balcão</label>
      <label><input type="radio" name="tipo_fp" value="Faturado"> Faturado</label>
    </div>

    <label>CNPJ</label>
    <input type="text" name="cnpj" data-sec="fonte">

    <label>Inscrição estadual</label>
    <input type="text" name="inscricao_estadual" data-sec="fonte">

    <label>Inscrição municipal</label>
    <input type="text" name="inscricao_municipal" data-sec="fonte">

    <label>E-mail</label>
    <input type="email" name="email_fp" data-sec="fonte">

    <h2>Endereço</h2>
    <label>CEP</label>
    <input type="text" name="cep_fp" data-sec="fonte">
    <label>Logradouro</label>
    <input type="text" name="logradouro_fp" data-sec="fonte">
    <label>Complemento</label>
    <input type="text" name="complemento_fp" data-sec="fonte">
    <label>Número</label>
    <input type="text" name="numero_fp" data-sec="fonte">
    <label>Bairro</label>
    <input type="text" name="bairro_fp" data-sec="fonte">
    <label>Cidade</label>
    <input type="text" name="cidade_fp" data-sec="fonte">
    <label>Estado (UF)</label>
    <input type="text" name="estado_fp" maxlength="2" data-sec="fonte">

    <h2>Contato e Faturamento</h2>
    <label>Telefone</label>
    <input type="tel" name="telefone_fp" data-sec="fonte">

    <label>Contato do responsável pelo faturamento (nome e telefone/e-mail)</label>
    <input type="text" name="contato_responsavel_faturamento" data-sec="fonte">

    <label>Dia do vencimento do faturamento</label>
    <input type="number" min="1" max="31" name="dia_vencimento_faturamento" data-sec="fonte">

    <h2>Logomarcas</h2>
    <label>Upload de logomarca para cabeçalho de laudo</label>
    <input type="file" name="logo_cabecalho" accept="image/*" data-sec="fonte">

    <label>Upload de logomarca para rodapé</label>
    <input type="file" name="logo_rodape" accept="image/*" data-sec="fonte">

    <label>Upload de logomarca para assinatura do responsável técnico</label>
    <input type="file" name="logo_assinatura" accept="image/*" data-sec="fonte">
  </div>

  <button type="submit" id="submitBtn">Enviar cadastro</button>
  </form>

  <div id="successMsg">✅ Cadastro enviado com sucesso! Você já pode fechar esta página.</div>
</div>

<script>
  // URL do Apps Script implantado como Web App
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxeAQhdsz-nWInPnj6chWN1iWC4Sr19Mtv-Dljg_Ay1pZHHHkVjRXL8JTgWrW5aUxNW/exec";

  const radiosTipo = document.querySelectorAll('input[name="tipo_cadastro"]');
  const secaoUnidade = document.getElementById('secaoUnidade');
  const secaoFonte = document.getElementById('secaoFonte');

  function atualizarSecoes() {
    const valor = document.querySelector('input[name="tipo_cadastro"]:checked');
    secaoUnidade.style.display = 'none';
    secaoFonte.style.display = 'none';
    document.querySelectorAll('[data-sec]').forEach(el => el.removeAttribute('required'));

    if (!valor) return;
    if (valor.value === 'unidade_coleta') {
      secaoUnidade.style.display = 'block';
      secaoUnidade.querySelectorAll('input[data-sec], select[data-sec], textarea[data-sec]').forEach(el => {
        if (el.type !== 'checkbox') el.setAttribute('required', 'required');
      });
    } else {
      secaoFonte.style.display = 'block';
      secaoFonte.querySelectorAll('input[data-sec], select[data-sec], textarea[data-sec]').forEach(el => {
        el.setAttribute('required', 'required');
      });
    }
  }
  radiosTipo.forEach(r => r.addEventListener('change', atualizarSecoes));

  function checkboxGrupoValido(secaoEl) {
    const grupos = secaoEl.querySelectorAll('[data-group]');
    for (const g of grupos) {
      const marcados = g.querySelectorAll('input:checked');
      if (marcados.length === 0) {
        alert('Selecione ao menos uma opção em: ' + (g.previousElementSibling ? g.previousElementSibling.textContent : 'um dos campos de múltipla escolha') );
        return false;
      }
    }
    return true;
  }

  function arquivoParaBase64(file) {
    return new Promise((resolve, reject) => {
      if (!file) { resolve(null); return; }
      const reader = new FileReader();
      reader.onload = () => {
        const base64 = reader.result.split(',')[1];
        resolve({ base64: base64, mimeType: file.type, filename: file.name });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  const form = document.getElementById('collectForm');
  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    const tipoSelecionado = document.querySelector('input[name="tipo_cadastro"]:checked');
    if (!tipoSelecionado) {
      alert('Selecione o que você está cadastrando.');
      return;
    }

    const secaoAtiva = tipoSelecionado.value === 'unidade_coleta' ? secaoUnidade : secaoFonte;
    if (!checkboxGrupoValido(secaoAtiva)) return;
    if (!form.checkValidity()) { form.reportValidity(); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = "Enviando...";

    const payload = { tipo_cadastro: tipoSelecionado.value };
    const formData = new FormData(form);
    for (const [key, value] of formData.entries()) {
      if (payload[key] === undefined) {
        payload[key] = value;
      } else if (Array.isArray(payload[key])) {
        payload[key].push(value);
      } else {
        payload[key] = [payload[key], value];
      }
    }

    if (tipoSelecionado.value === 'fonte_pagadora') {
      const inputLogoCabecalho = form.querySelector('input[name="logo_cabecalho"]').files[0];
      const inputLogoRodape = form.querySelector('input[name="logo_rodape"]').files[0];
      const inputLogoAssinatura = form.querySelector('input[name="logo_assinatura"]').files[0];
      payload.logo_cabecalho = await arquivoParaBase64(inputLogoCabecalho);
      payload.logo_rodape = await arquivoParaBase64(inputLogoRodape);
      payload.logo_assinatura = await arquivoParaBase64(inputLogoAssinatura);
    }

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      form.style.display = 'none';
      document.querySelector('.top-select').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    } catch (err) {
      alert('Ocorreu um erro ao enviar. Verifique sua conexão e tente novamente.');
      btn.disabled = false;
      btn.textContent = "Enviar cadastro";
    }
  });
</script>
</body>
</html>
